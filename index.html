
<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>
    Medical RFID Information System
  </title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>

    :root{
      --primary:#0f4c81;
      --primary-light:#1f6fb2;
      --secondary:#00a6a6;
      --accent:#e63946;
      --bg:#f4f8fb;
      --card:#ffffff;
      --text:#1e293b;
      --muted:#64748b;
      --border:#dbe5ef;
      --success:#16a34a;
      --danger-bg:#fff1f2;
      --shadow:0 12px 40px rgba(15,76,129,0.08);
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Inter',sans-serif;
    }

    body{
      background:
      linear-gradient(135deg,#eef6fb 0%,#f8fbfd 45%,#edf7f8 100%);
      min-height:100vh;
      padding:32px;
      color:var(--text);
    }

    .dashboard-shell{
      max-width:1450px;
      margin:auto;
    }

    .top-banner{
      background:
      linear-gradient(135deg,#0f4c81 0%,#155e95 45%,#0b7c89 100%);
      border-radius:28px;
      padding:34px 40px;
      color:white;
      box-shadow:0 20px 60px rgba(15,76,129,0.25);
      position:relative;
      overflow:hidden;
      margin-bottom:28px;
    }

    .top-banner::before{
      content:"";
I redesigned the website into a professional medical-dashboard style interface while retaining all existing functionality, API integration, patient data fields, AI summary support, image handling, and report links.

The new design includes:

Modern hospital/healthcare UI

Professional medical color palette

Dashboard-style layout

Better patient profile presentation

Responsive design for mobile and desktop

Improved cards, spacing, shadows, and typography

Cleaner AI summary and medical image sections

More polished RFID scanner console and status indicators




<div class="header-left">

  <h1>
    Medical RFID Information System
  </h1>

  <p>
    ESP32 + RFID + Google Sheets + Ollama AI
  </p>

</div>

<div class="status" id="status">

  Waiting for RFID Scan...

</div>
<div class="top-section">

  <div class="scan-box">

    <h2>
      Scanned RFID UID
    </h2>

    <div
      class="uid-display"
      id="uidDisplay">

      --------

    </div>

  </div>

  <button
    class="load-btn"
    onclick="fetchPatientData()">

    LOAD PATIENT DATA

  </button>

</div>

<div class="loader" id="loader"></div>

<div class="not-found" id="notFound">

  No patient record found
  for this RFID card.

</div>

<div class="patient-card" id="patientCard">

  <div class="patient-header">

    <div class="avatar" id="avatar">
      P
    </div>

    <div>

      <div
        class="patient-name"
        id="patientName">

        Patient Name

      </div>

      <div
        class="patient-id"
        id="patientUID">

        UID: 000000

      </div>

    </div>

  </div>

  <div class="info-grid">

    <div class="info-box">
      <div class="info-title">Height</div>
      <div class="info-value" id="height">--</div>
    </div>

    <div class="info-box">
      <div class="info-title">Weight</div>
      <div class="info-value" id="weight">--</div>
    </div>

    <div class="info-box">
      <div class="info-title">Age</div>
      <div class="info-value" id="age">--</div>
    </div>

    <div class="info-box">
      <div class="info-title">Gender</div>
      <div class="info-value" id="gender">--</div>
    </div>

    <div class="info-box">
      <div class="info-title">Blood Group</div>
      <div class="info-value" id="blood">--</div>
    </div>

    <div class="info-box">
      <div class="info-title">Phone Number</div>
      <div class="info-value" id="phone">--</div>
    </div>

    <div class="info-box">
      <div class="info-title">Doctor</div>
      <div class="info-value" id="doctor">--</div>
    </div>

    <div class="info-box">
      <div class="info-title">Hospital</div>
      <div class="info-value" id="hospital">--</div>
    </div>

    <div class="info-box critical">
      <div class="info-title">Medical Condition</div>
      <div class="info-value" id="condition">--</div>
    </div>

    <div class="info-box critical">
      <div class="info-title">Allergies</div>
      <div class="info-value" id="allergies">--</div>
    </div>

    <div class="info-box critical">
      <div class="info-title">Previous Visit</div>
      <div class="info-value" id="visit">--</div>
    </div>

    <div class="info-box critical">
      <div class="info-title">Visit Reason</div>
      <div class="info-value" id="reason">--</div>
    </div>

    <div class="info-box critical">
      <div class="info-title">Diagnosis</div>
      <div class="info-value" id="diagnosis">--</div>
    </div>

    <div class="info-box">
      <div class="info-title">Last Updated</div>
      <div class="info-value" id="updated">--</div>
    </div>

  </div>

  <div class="extra-section">

    <!-- =============================== -->
    <!-- MEDICAL IMAGES -->
    <!-- =============================== -->

    <div class="info-box" style="margin-bottom:20px;">

      <div class="info-title">

        X-Ray / MRI Images

      </div>

      <div
        class="image-container"
        id="medicalImages">

      </div>

    </div>

    <!-- =============================== -->
    <!-- PDF REPORT -->
    <!-- =============================== -->

    <div class="info-box" style="margin-bottom:20px;">

      <div class="info-title">

        Previous Medical Report PDF

      </div>

      <a
        id="reportLink"
        href="#"
        target="_blank"
        class="report-link">

        Open Medical Report

      </a>

    </div>

    <!-- =============================== -->
    <!-- AI SUMMARY -->
    <!-- =============================== -->

    <div class="info-box">

      <div class="info-title">

        AI Medical Summary

      </div>

      <div
        id="aiSummary"
        class="summary-box">

        Waiting for AI Summary...

      </div>

    </div>

  </div>

</div>
